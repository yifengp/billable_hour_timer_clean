<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Billable Hour Machine</title>
  <link rel="stylesheet" href="window-full.css" />
</head>
<body>
  <button id="detailMenuButton" class="iconMenuButton" type="button" aria-label="Open details menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div id="title" class="pixel-font">Billable Hour Machine!</div>

  <div id="dateLine" class="pixel-font">--</div>
  <div id="currentTime" class="pixel-font">--</div>
  <div id="unitDisplay" class="pixel-font">Idle</div>

  <button id="startStopButton" aria-label="Start or stop timer">
    <div id="overlay"></div>
  </button>

  <div class="timerControls">
    <button id="pauseResumeButton" disabled>Pause</button>
  </div>

  <section id="milestonePanel" class="panel milestoneHomePanel">
    <div id="primaryMilestoneSummary" class="primaryMilestoneSummary pixel-font-small"></div>
    <div id="weekGrid" class="weekGrid pixel-font-small"></div>
    <div class="panelTitle pixel-font-small currentQuarterTitle">Current Quarter</div>
    <div id="currentQuarterSummary" class="quarterSummary currentQuarterSummary pixel-font-small"></div>
  </section>

  <aside id="detailMenuPanel" class="detailMenuPanel" aria-label="Milestone details" style="display:none;">
    <section class="panel detailPanel">
      <div class="panelTitle pixel-font-small">Timer Settings</div>
      <div id="unitLengthControl" class="unitLengthControl pixel-font-small">
        <label>
          Unit Length
          <span class="unitLengthField">
            <input id="unitLengthInput" type="number" min="1" max="30" value="6" />
            <span>minutes</span>
          </span>
        </label>
        <div id="unitLengthHint" class="unitLengthHint"></div>
      </div>
    </section>

    <section class="panel detailPanel">
      <div class="panelTitle pixel-font-small">Annual Setup</div>
    <div class="milestoneInputs">
      <label>
        Target annual billable hours
        <input id="targetHoursInput" type="number" min="0" step="0.1" placeholder="1800" />
      </label>
      <label>
        Current completed hours
        <input id="startingHoursInput" type="number" min="0" step="0.1" placeholder="0" />
      </label>
      <div class="allocationHeader">
        <span>Existing hours allocation</span>
        <button id="allocationToggleButton" type="button">Allocate</button>
      </div>
      <div id="allocationPanel" class="allocationPanel" style="display:none;">
        <label>
          Mode
          <select id="allocationModeSelect">
            <option value="auto">Auto oldest first</option>
            <option value="current">All current quarter</option>
            <option value="custom">Custom split</option>
          </select>
        </label>
        <div id="allocationHint" class="allocationHint"></div>
        <div id="customAllocationGrid" class="customAllocationGrid" style="display:none;">
          <label>Q1 <input id="q1AllocationInput" type="number" min="0" step="0.1" value="0" /></label>
          <label>Q2 <input id="q2AllocationInput" type="number" min="0" step="0.1" value="0" /></label>
          <label>Q3 <input id="q3AllocationInput" type="number" min="0" step="0.1" value="0" /></label>
          <label>Q4 <input id="q4AllocationInput" type="number" min="0" step="0.1" value="0" /></label>
        </div>
      </div>
    </div>
    </section>

    <section class="panel detailPanel">
      <div class="panelTitle pixel-font-small">Annual Details</div>
      <div id="milestoneSummary" class="milestoneSummary pixel-font-small"></div>
    </section>

    <section class="panel detailPanel">
      <div class="panelTitle pixel-font-small">All Quarters</div>
      <div id="allQuarterSummary" class="quarterSummary pixel-font-small"></div>
    </section>
  </aside>

  <div id="lastSessionTitle" class="pixel-font-small">Last Session</div>
  <div id="lastSessionInfo" class="sessionBox pixel-font-small"></div>

  <button id="viewHistoryButton">Show All Worklog</button>

  <div id="historyArea" style="display:none;">
    <div id="historyDisplay" class="scrollableArea pixel-font-small"></div>
  </div>

  <button id="clearHistoryButton">Clean All Worklog</button>

  <div id="inputModal" class="modal" style="display:none;">
    <div class="modal-content">
      <label for="clientInput">Client / Project ID:</label><br />
      <input type="text" id="clientInput" /><br /><br />
      <label for="notesInput">Notes:</label><br />
      <input type="text" id="notesInput" /><br /><br />
      <button id="confirmSaveButton">Confirm & Save</button>
    </div>
  </div>

  <div class="footer-suggestion pixel-font-small">
    <a href="https://paypal.me/YPeng825/4" target="_blank">Buy Me a Coffee</a>
    <span>|</span>
    <a href="https://github.com/yifengp/billable_hour_machine/issues" target="_blank">Feedback</a>
  </div>

  <script src="src/timer.js"></script>
  <script src="src/milestone.js"></script>
  <script src="window-full.js"></script>
</body>
</html>
